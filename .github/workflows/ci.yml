name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        continue-on-error: false

      - name: Build shared package
        run: pnpm --filter @abarrotes/shared build
        continue-on-error: false

      - name: Typecheck
        run: pnpm typecheck
        continue-on-error: false

      - name: Lint
        run: pnpm lint
        continue-on-error: false

      - name: Test
        run: pnpm test
        continue-on-error: false

      - name: Build
        run: pnpm build
        continue-on-error: false
